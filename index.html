<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial-Chic Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="background-layers">
        <div class="layer" id="layer-estamparia" style="background-color: #c9a46a;" data-section="estamparia"></div>
        <div class="layer" id="layer-laser" style="background-color: #444c54;" data-section="laser"></div>
        <div class="layer" id="layer-acrilico" style="background-color: #00d4ff;" data-section="acrilico"></div>
    </div>

    <main id="scroll-container">
        <section id="estamparia" class="fullscreen-section">
            <div class="content">
                <h1>Estamparia</h1>
                <p>Impacto e precisão que moldam o metal.</p>
            </div>
        </section>
        <section id="laser" class="fullscreen-section">
            <canvas id="laser-canvas"></canvas>
            <div class="content">
                <h1>Laser de Fibra</h1>
                <p>A erosão metálica elevada à arte.</p>
            </div>
        </section>
        <section id="acrilico" class="fullscreen-section">
            <div class="glass-effect"></div>
            <div class="content">
                <h1>Acrílico Premium</h1>
                <p>Transparência que redefine a forma.</p>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
